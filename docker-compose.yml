services:
  shell:
    build: .
    image: duopara-dev
    volumes:
      - duopara_workspace:/workspace
    environment:
      DATABASE_URL: file:/workspace/packages/backend/prisma/dev.db
      JWT_SECRET: local-dev-secret
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: 3009
    command: sh
    profiles:
      - tools

  backend:
    build: .
    image: duopara-dev
    volumes:
      - duopara_workspace:/workspace
    environment:
      DATABASE_URL: file:/workspace/packages/backend/prisma/dev.db
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: 3009
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3009:3009"
    command: sh -c "npm run db:push && npm run dev --workspace=@duopara/backend"

  frontend:
    build: .
    image: duopara-dev
    volumes:
      - duopara_workspace:/workspace
    environment:
      VITE_API_URL: http://backend:3009
      VITE_PORT: 5173
    ports:
      - "5173:5173"
    command: npm run dev --workspace=@duopara/frontend -- --host 0.0.0.0
    depends_on:
      - backend

  frontend-react:
    build: .
    image: duopara-dev
    volumes:
      - duopara_workspace:/workspace
    environment:
      VITE_API_URL: http://backend:3009
      VITE_PORT: 5174
    ports:
      - "5174:5174"
    command: npm run dev --workspace=@duopara/frontend-react -- --host 0.0.0.0
    depends_on:
      - backend
    profiles:
      - react

volumes:
  duopara_workspace:
